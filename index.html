window.signup = async function(){
  let userVal = document.getElementById("su_user").value;
  let emailVal = document.getElementById("su_email").value;
  let passVal = document.getElementById("su_pass").value;

  await addDoc(collection(db,"users"),{
    user: userVal,
    email: emailVal,
    pass: passVal,
    balance: 0
  });

  alert("Signup success ✅");
}

// LOGIN
window.login = async function(){
  let emailVal = document.getElementById("li_email").value;
  let passVal = document.getElementById("li_pass").value;

  let snap = await getDocs(collection(db,"users"));

  let found = false;

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    if(d.email==emailVal && d.pass==passVal){
      found = true;

      localStorage.setItem("user",JSON.stringify(d));

      document.getElementById("user").innerText = d.user;
      document.getElementById("email").innerText = d.email;
      document.getElementById("bal").innerText = d.balance;

      document.getElementById("auth").style.display="none";
      document.getElementById("dashboard").style.display="block";
    }
  });

  if(!found){
    alert("Invalid login ❌");
  }
}
      if(d.email=="admin@tradex.com"){

        loadUsers();
      }
      loadSupportMessages();
    }
  });
}

// BUY
window.buy = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = Number(amount.value || 0);

  u.balance += amt;

  await updateDoc(doc(db,"users",u.id),{
    balance: u.balance
  });

  bal.innerText=u.balance;
}

// SELL
window.sell = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = Number(amount.value || 0);

  u.balance -= amt;

  await updateDoc(doc(db,"users",u.id),{
    balance: u.balance
  });

  bal.innerText=u.balance;
}

// ADMIN UPDATE
window.updateBalance = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(async (docSnap)=>{
    let d = docSnap.data();

    if(d.email == targetEmail.value){
      await updateDoc(doc(db,"users",docSnap.id),{
        balance: Number(newBal.value)
      });

      alert("Balance Updated ✅");
    }
  });
}

}

async function loadChat(){
  let u=JSON.parse(localStorage.getItem("user"));

}

    email:u.email,
    message:msg,
    sender:"user"
  });
