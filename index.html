<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Ultimate FIXED</title><style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center;font-weight:bold}
.card{background:#111;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px}
button{background:#ff9800;color:#fff}
.bottom{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.bottom button{flex:1;background:#222}
</style></head><body><div class="header">🔥 TradeX Ultimate</div><div id="auth">
<div class="card">
<h3>Signup</h3>
<input id="su_user" placeholder="Username">
<input id="su_email" placeholder="Email">
<input id="su_pass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div><div class="card">
<h3>Login</h3>
<input id="li_email" placeholder="Email">
<input id="li_pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div><div id="dashboard" style="display:none"><div class="card">
<h3>Welcome <span id="user"></span></h3>
<p id="email"></p>
<h2>Balance: $<span id="bal">0</span></h2>
</div><div class="card">
<h3>Trade</h3>
<input id="amount" placeholder="Enter amount">
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div><div class="card">
<h3>💰 Deposit</h3>
<button onclick="openDeposit()">Add Funds</button><div id="depositBox" style="display:none;">
<p><b>Wallet Address:</b></p>
<p id="walletAddress">TQ6RJsuo9xah3GbL4U3fuboTYhGkdY6CB</p>
<button onclick="copyWallet()">Copy</button><br><br> <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQ6RJsuo9xah3GbL4U3fuboTYhGkdY6CB">

<button onclick="closeDeposit()">Close</button>

</div>
</div><div class="card">
<h3>Market</h3>
<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>
  <button onclick="openSupport()">Customer Support 💬</button>
  
<iframe id="chart" width="100%" height="300"></iframe>
</div><div class="card">
<h3>Support</h3>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div><div id="adminPanel" class="card" style="display:none">
<h3>👑 Admin Panel</h3>
<input id="targetEmail" placeholder="User Email">
<input id="newBal" placeholder="New Balance">
<button onclick="updateBalance()">Update Balance</button>
<div id="users"></div>
</div><button onclick="logout()">Logout</button>

</div><div class="bottom">
<button onclick="scrollToTop()">Home</button>
<button onclick="scrollToChart()">Market</button>
<button onclick="scrollToSupport()">Support</button>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbMvOjA4m1QtnuRt7m7jXAddQq-W-Sh-k",
  authDomain: "tradex-support.firebaseapp.com",
  projectId: "tradex-support",
  storageBucket: "tradex-support.appspot.com",
  messagingSenderId: "822784979542",
  appId: "1:822784979542:web:4b53d1c77c922eeb6781f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
  await addDoc(collection(db,"users"),{
    user: su_user.value,
    email: su_email.value,
    pass: su_pass.value,
    balance: 0
  });
  alert("Signup success ✅");
}

// LOGIN
window.login = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    if(d.email==li_email.value && d.pass==li_pass.value){

      localStorage.setItem("user",JSON.stringify({...d,id:docSnap.id}));

      user.innerText=d.user;
      email.innerText=d.email;
      bal.innerText=d.balance || 0;

      auth.style.display="none";
      dashboard.style.display="block";

      if(d.email=="admin@tradex.com"){
        adminPanel.style.display="block";
        loadUsers();
      }
    }
  });
}

// BUY
window.buy = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = Number(amount.value || 0);

  u.balance += amt;

  await updateDoc(doc(db,"users",u.id),{
    balance: u.balance
  });

  bal.innerText=u.balance;
}

// SELL
window.sell = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = Number(amount.value || 0);

  u.balance -= amt;

  await updateDoc(doc(db,"users",u.id),{
    balance: u.balance
  });

  bal.innerText=u.balance;
}

// ADMIN UPDATE
window.updateBalance = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(async (docSnap)=>{
    let d = docSnap.data();

    if(d.email == targetEmail.value){
      await updateDoc(doc(db,"users",docSnap.id),{
        balance: Number(newBal.value)
      });

      alert("Balance Updated ✅");
    }
  });
}

// LOAD USERS
async function loadUsers(){
  let snap = await getDocs(collection(db,"users"));
  let html="";

  snap.forEach(doc=>{
    let d=doc.data();
    html += `<p>${d.email || "No Email"} - $${d.balance || 0}</p>`;
  });

  users.innerHTML=html;
}

// CHART
window.setCoin = function(c){
  chart.src = "https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c;
}

// SUPPORT
window.sendMsg = function(){
  alert("Message sent ✅");
}

// NAV
window.logout=()=>location.reload();
window.scrollToTop=()=>window.scrollTo(0,0);
  const supportBox = document.getElementById("supportBox");

window.openSupport = function(){
  supportBox.style.display = "block";
  loadChat();
}

window.closeSupport = function(){
  supportBox.style.display = "none";
}

window.sendSupport = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let msg = document.getElementById("supportMsg").value;

  if(!msg){
    alert("Message likho ❌");
    return;
  }

  await addDoc(collection(db,"support"),{
    email: u.email,
    message: msg,
    sender: "user",
    time: new Date().toLocaleString()
  });

  document.getElementById("supportMsg").value = "";

  loadChat();
}
window.scrollToChart=()=>chart.scrollIntoView();
window.scrollToSupport=()=>msg.scrollIntoView();
  window.openSupport = function(){
  supportBox.style.display = "block";
  loadChat(); // chat load hoga
}

window.closeSupport = function(){
  supportBox.style.display = "none";
}
window.sendSupport = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let msg = document.getElementById("supportMsg").value;

  if(!msg){
    alert("Message likho ❌");
    return;
  }

  await addDoc(collection(db,"support"),{
    email: u.email,
    message: msg,
    sender: "user",
    time: new Date().toLocaleString()
  });

  document.getElementById("supportMsg").value = "";

  loadChat(); // 👈 message turant show hoga
               }
// DEPOSIT
window.openDeposit=()=>depositBox.style.display="block";
window.closeDeposit=()=>depositBox.style.display="none";
window.copyWallet=()=>{
  navigator.clipboard.writeText(walletAddress.innerText);
  alert("Copied ✅");
}

window.onload=()=>setCoin("BTCUSDT");
  async function loadChat(){
  let u = JSON.parse(localStorage.getItem("user"));
  let snap = await getDocs(collection(db,"support"));

  let html="";

  snap.forEach(doc=>{
    let d = doc.data();

    if(d.email == u.email){
      html += `<p>${d.message}</p>`;
    }
  });

  document.getElementById("chatArea").innerHTML = html;
  }
</script>
<div id="supportBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0b141a; color:#fff;">

  <div style="background:#202c33; padding:15px;">
    <b>Support Chat 💬</b>
    <button onclick="closeSupport()" style="float:right;">X</button>
  </div>

  <!-- Messages -->
  <div id="chatArea" style="height:70%; overflow-y:auto; padding:10px;"></div>

  <!-- Input -->
  <div style="position:absolute; bottom:0; width:100%; background:#202c33; padding:10px;">
    <input id="supportMsg" placeholder="Type message..." style="width:70%; padding:10px;">
    <button onclick="sendSupport()">Send</button>
  </div>

</div>
</body>
</html>
