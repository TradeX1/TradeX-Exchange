<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}
.header{
  background:#ff9800;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}
.card{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
}
button{
  background:#ff9800;
  color:#fff;
}
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.bottom button{
  flex:1;
  background:#222;
}
</style>
</head>

<body>

<div class="header">🔥 TradeX Pro</div>

<!-- AUTH -->
<div id="auth">
<div class="card">
<h3>Signup</h3>
<input id="su_user" placeholder="Username">
<input id="su_email" placeholder="Email">
<input id="su_pass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="li_email" placeholder="Email">
<input id="li_pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<h3>Welcome <span id="user"></span></h3>
<p>Email: <span id="email"></span></p>
<h2>Balance: $<span id="bal">0</span></h2>
</div>

<div class="card">
<h3>Trade</h3>
<input id="amount" placeholder="Enter amount">
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div>

<div class="card">
<h3>Market</h3>
<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>

<iframe id="chart" width="100%" height="300"></iframe>
</div>

<div class="card">
<h3>Customer Support</h3>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send Message</button>
</div>

<div id="adminPanel" class="card" style="display:none">
<h3>👑 Admin Panel</h3>
<input id="targetEmail" placeholder="User Email">
<input id="newBal" placeholder="New Balance">
<button onclick="updateBalance()">Update Balance</button>

<div id="users"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<div class="bottom">
<button onclick="scrollToTop()">Home</button>
<button onclick="scrollToChart()">Market</button>
<button onclick="scrollToSupport()">Support</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR REAL FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCbMvOjA4m1QtnuRt7m7jXAddQq-W-Sh-k",
  authDomain: "tradex-support.firebaseapp.com",
  projectId: "tradex-support",
  storageBucket: "tradex-support.appspot.com",
  messagingSenderId: "822784979542",
  appId: "1:822784979542:web:4b53d1c77c922eeb6781f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
  await addDoc(collection(db,"users"),{
    user: su_user.value,
    email: su_email.value,
    pass: su_pass.value,
    balance: 0
  });
  alert("Signup success ✅");
}

// LOGIN
window.login = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    if(d.email==li_email.value && d.pass==li_pass.value){

      localStorage.setItem("user",JSON.stringify(d));

      user.innerText=d.user;
      email.innerText=d.email;
      bal.innerText=d.balance;

      auth.style.display="none";
      dashboard.style.display="block";

      // ADMIN CHECK
      if(d.email=="admin@tradex.com"){
        adminPanel.style.display="block";
        loadUsers();
      }

    }
  });
}

// BUY
window.buy=function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = parseInt(amount.value || 0);

  u.balance += amt*0.2;
  bal.innerText=u.balance;
}

// SELL
window.sell=function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let amt = parseInt(amount.value || 0);

  u.balance -= amt*0.2;
  bal.innerText=u.balance;
}

// CHART
window.setCoin=function(c){
  chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c;
}

// SUPPORT
window.sendMsg=function(){
  alert("Message sent to support ✅");
}

// ADMIN UPDATE
window.updateBalance = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(async (docSnap)=>{
    let d = docSnap.data();

    if(d.email==targetEmail.value){
      await updateDoc(doc(db,"users",docSnap.id),{
        balance: Number(newBal.value)
      });
      alert("Balance Updated ✅");
    }
  });
}

// LOAD USERS
async function loadUsers(){
  let snap = await getDocs(collection(db,"users"));
  let html="";
  snap.forEach(doc=>{
    let d=doc.data();
    html+=`<p>${d.email} - $${d.balance}</p>`;
  });
  users.innerHTML=html;
}

// NAVIGATION
window.scrollToTop=()=>window.scrollTo(0,0);
window.scrollToChart=()=>chart.scrollIntoView();
window.scrollToSupport=()=>msg.scrollIntoView();

window.logout=function(){
  location.reload();
}

// DEFAULT CHART LOAD
window.onload=function(){
  setCoin("BTCUSDT");
}

</script>

</body>
</html>
