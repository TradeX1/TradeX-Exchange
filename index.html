  let u = JSON.parse(localStorage.getItem("user"));
  let amt = Number(amount.value || 0);

  u.balance += amt;

  await updateDoc(doc(db,"users",u.id),{
    balance: u.balance
  });

  bal.innerText=u.balance;
}

// SELL
window.sell = async function(){
  let u = JSON.parse(localStorage.getItem("user"));

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Fixed</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center;font-weight:bold}
.card{background:#111;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px}
button{background:#ff9800;color:#fff}

<body>

<div class="header">🔥 TradeX FIXED</div>

<div id="auth">
<div class="card">
<h3>Signup</h3>
<input id="su_user">
<input id="su_email">
<input id="su_pass">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="li_email">
<input id="li_pass">
<button onclick="login()">Login</button>
</div>
</div>

<div id="dashboard" style="display:none">
<div class="card">
<h3>Welcome <span id="user"></span></h3>
<p id="email"></p>
<h2>$<span id="bal">0</span></h2>
</div>

<button onclick="openSupport()">Customer Support 💬</button>
<button onclick="logout()">Logout</button>

<div id="adminPanel" style="display:none">
<h3>Admin Messages</h3>
<div id="adminMessages"></div>
</div>

</div>

<!-- CHAT UI -->
<div id="supportBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;">
<div style="background:#222;padding:10px;">
Support Chat
<button onclick="closeSupport()">X</button>
</div>

<div id="chatArea" style="height:70%;overflow:auto;"></div>

<input id="supportMsg">
<button onclick="sendSupport()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSyCb...",
authDomain: "tradex-support.firebaseapp.com",
projectId: "tradex-support"
});

const db = getFirestore(app);

let currentChatUser = "";

// SIGNUP
window.signup = async function(){
  await addDoc(collection(db,"users"),{
    user: su_user.value,
    email: su_email.value,
    pass: su_pass.value,
    balance: 0
  });
  alert("Signup Done");
}

// LOGIN
window.login = async function(){
  let snap = await getDocs(collection(db,"users"));

  snap.forEach(docSnap=>{
    let d = docSnap.data();

    if(d.email==li_email.value && d.pass==li_pass.value){

      localStorage.setItem("user",JSON.stringify({...d,id:docSnap.id}));

      user.innerText=d.user;
      email.innerText=d.email;
      bal.innerText=d.balance;

      auth.style.display="none";
      dashboard.style.display="block";

      if(d.email=="admin@tradex.com"){
        adminPanel.style.display="block";
        loadAdminMessages();
      }
    }
  });
}

// CHAT OPEN
window.openSupport = function(){
  supportBox.style.display="block";
  loadChat();
}

// CLOSE
window.closeSupport = function(){
  supportBox.style.display="none";
}

// USER CHAT
async function loadChat(){
  let u = JSON.parse(localStorage.getItem("user"));
  let snap = await getDocs(collection(db,"support"));

  let html="";

  snap.forEach(doc=>{
    let d = doc.data();
    if(d.email==u.email){
      html += `<p>${d.message}</p>`;
    }
  });

  chatArea.innerHTML=html;
}

// ADMIN CHAT LOAD
async function loadAdminChat(){
  let snap = await getDocs(collection(db,"support"));
  let html="";

  snap.forEach(doc=>{
    let d = doc.data();

    if(d.email==currentChatUser){
      html += `<p>${d.sender}: ${d.message}</p>`;
    }
  });

  chatArea.innerHTML=html;
}

// SEND MESSAGE
window.sendSupport = async function(){
  let u = JSON.parse(localStorage.getItem("user"));
  let msg = supportMsg.value;

  let email = currentChatUser || u.email;
  let sender = currentChatUser ? "admin" : "user";

  await addDoc(collection(db,"support"),{
    email,
    message: msg,
    sender
  });

  supportMsg.value="";

  currentChatUser ? loadAdminChat() : loadChat();
}

// ADMIN LIST
async function loadAdminMessages(){
  let snap = await getDocs(collection(db,"support"));
  let html="";

  snap.forEach(doc=>{
    let d = doc.data();

    html += `<p onclick="openAdminChat('${d.email}')">${d.email}</p>`;
  });

  adminMessages.innerHTML=html;
}

// OPEN ADMIN CHAT
window.openAdminChat = function(email){
  currentChatUser=email;
  openSupport();
  loadAdminChat();
}

window.logout=()=>location.reload();

</script>

</body>
