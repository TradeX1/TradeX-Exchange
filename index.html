<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeX Complete</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:#fff}
.header{background:#ff9800;padding:15px;text-align:center;font-weight:bold}
.card{background:#121826;padding:15px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:10px;border:none;border-radius:5px}
button{background:#ff9800;color:#fff}
#chatBox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none}
</style>
</head>

<body>

<div class="header">🔥 TradeX Complete</div>

<!-- AUTH -->
<div id="auth">
<div class="card">
<h3>Signup</h3>
<input id="su_email" placeholder="Email">
<input id="su_pass" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<div class="card">
<h3>Login</h3>
<input id="li_email" placeholder="Email">
<input id="li_pass" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<div class="card">
<h3 id="welcome"></h3>
<h2>Balance: $<span id="bal">0</span></h2>
</div>

<div class="card">
<input id="amount" placeholder="Amount">
<button onclick="buy()">Buy</button>
<button onclick="sell()">Sell</button>
</div>

<div class="card">
<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
<h3>Market</h3>
<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>
<iframe id="chart" width="100%" height="300"></iframe>
</div>

<div class="card">
<button onclick="openChat()">Customer Support 💬</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="card" style="display:none">
<h3>Admin Panel</h3>

<h4>Users</h4>
<div id="usersList"></div>

<h4>Deposits</h4>
<div id="deposits"></div>

<h4>Withdraws</h4>
<div id="withdraws"></div>
</div>

<button onclick="logout()">Logout</button>

</div>

<!-- CHAT -->
<div id="chatBox">
<div style="background:#111;padding:10px">
Chat <button onclick="closeChat()" style="float:right">X</button>
</div>

<div id="chatArea" style="height:70%;overflow:auto"></div>

<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔴 APNA CONFIG YAHA PASTE KARO
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH
window.signup = async ()=>{
  let res = await createUserWithEmailAndPassword(auth,su_email.value,su_pass.value);
  await setDoc(doc(db,"users",res.user.uid),{
    email:su_email.value,
    balance:0
  });
  alert("Signup success");
}

window.login = async ()=>{
  await signInWithEmailAndPassword(auth,li_email.value,li_pass.value);
}

// AUTO LOGIN
onAuthStateChanged(auth, async (user)=>{
  if(user){
    let snap = await getDoc(doc(db,"users",user.uid));
    let data = snap.data();

    auth.style.display="none";
    dashboard.style.display="block";

    welcome.innerText=data.email;
    bal.innerText=data.balance;

    if(data.email=="admin@tradex.com"){
      adminPanel.style.display="block";
      loadUsers();
      loadDeposits();
      loadWithdraws();
    }
  }
});

// BUY/SELL
window.buy = async ()=>{
  let u = auth.currentUser;
  let ref = doc(db,"users",u.uid);
  let snap = await getDoc(ref);

  await updateDoc(ref,{
    balance: snap.data().balance + Number(amount.value)
  });

  alert("Buy done");
}

window.sell = async ()=>{
  let u = auth.currentUser;
  let ref = doc(db,"users",u.uid);
  let snap = await getDoc(ref);

  await updateDoc(ref,{
    balance: snap.data().balance - Number(amount.value)
  });

  alert("Sell done");
}

// DEPOSIT
window.deposit = async ()=>{
  let u = auth.currentUser;
  let amt = Number(prompt("Deposit amount"));

  await addDoc(collection(db,"transactions"),{
    uid:u.uid,type:"deposit",amount:amt,status:"pending"
  });

  alert("Deposit request sent");
}

// WITHDRAW
window.withdraw = async ()=>{
  let u = auth.currentUser;
  let amt = Number(prompt("Withdraw amount"));

  await addDoc(collection(db,"transactions"),{
    uid:u.uid,type:"withdraw",amount:amt,status:"pending"
  });

  alert("Withdraw request sent");
}

// ADMIN
async function loadUsers(){
  let snap = await getDocs(collection(db,"users"));
  let html="";
  snap.forEach(d=>{
    html+=`<p>${d.data().email}</p>`;
  });
  usersList.innerHTML=html;
}

async function loadDeposits(){
  let snap = await getDocs(collection(db,"transactions"));
  let html="";
  snap.forEach(d=>{
    let data=d.data();
    if(data.type=="deposit" && data.status=="pending"){
      html+=`<p>${data.uid} $${data.amount}
      <button onclick="approveDeposit('${d.id}','${data.uid}',${data.amount})">Approve</button></p>`;
    }
  });
  deposits.innerHTML=html;
}

window.approveDeposit = async (id,uid,amt)=>{
  let ref = doc(db,"users",uid);
  let snap = await getDoc(ref);

  await updateDoc(ref,{
    balance:snap.data().balance+amt
  });

  await updateDoc(doc(db,"transactions",id),{status:"done"});
  loadDeposits();
}

// CHAT
window.openChat=()=>chatBox.style.display="block";
window.closeChat=()=>chatBox.style.display="none";

window.sendMsg = async ()=>{
  let u = auth.currentUser;
  await addDoc(collection(db,"chat"),{
    uid:u.uid,
    msg:msg.value
  });
  msg.value="";
}

// LOGOUT
window.logout = ()=>signOut(auth);

// CHART
window.setCoin = c=>{
  chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c;
}
window.onload=()=>setCoin("BTCUSDT");

</script>
</body>
</html>
